<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern static library website built with React"
    />
    <title>പതിയാർ ഗ്രന്ഥാലയം</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "Merriweather", Georgia, Times, "Times New Roman", serif;
        line-height: 1.5;
        font-weight: 400;
        color: #1f2937;
        background: #f5efe6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #f7f0e6 0%, #e8e1d3 100%);
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font: inherit;
      }
      .app-shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding: 28px 28px;
        border-radius: 14px;
        color: #fff;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)),
          url("https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1400&q=80");
        background-size: cover;
        background-position: center;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.12);
      }
      .nav-links {
        display: flex;
        gap: 10px;
      }
      .nav-brand strong {
        font-size: 1rem;
        font-weight: 800;
        line-height: 1;
        display: inline-block;
        margin-right: 12px;
        text-shadow: 0 3px 8px rgba(0, 0, 0, 0.45);
      }
      .nav-title {
        font-size: 1.8rem;
        font-weight: 200;
        color: #fff;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      }
      @media (max-width: 720px) {
        .nav-title {
          font-size: 1rem;
        }
      }
      .nav-link {
        border: none;
        background: #f1e9db;
        padding: 8px 14px;
        border-radius: 999px;
        cursor: pointer;
        color: #355942;
      }
      .nav-link.active {
        background: #1f3a2c;
        color: #fff;
      }
      .section-card.event-banner,
      .event-banner {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        background: linear-gradient(135deg, #1f3a2c, #2d6a4f);
        color: #fff;
        border-radius: 22px;
        padding: 24px 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
        margin-bottom: 20px;
      }
      .event-banner .event-badge {
        background: rgba(255, 255, 255, 0.16);
        color: #fff200;
        letter-spacing: 0.22em;
        font-size: 0.8rem;
        font-weight: 700;
        padding: 10px 16px;
        border-radius: 999px;
      }
      .event-banner h2 {
        margin: 0;
        font-size: 1.9rem;
        line-height: 1.1;
      }
      .event-banner p {
        margin: 10px 0 0;
        max-width: 760px;
        color: rgba(255, 255, 255, 0.88);
      }
      .event-banner .event-note {
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.95rem;
      }
      @media (max-width: 720px) {
        .section-card.event-banner,
        .event-banner {
          flex-direction: column;
          gap: 14px;
        }
        .event-banner h2 {
          font-size: 1.4rem;
        }
      }
      .hero {
        background: #1f3a2c;
        color: #f9f5eb;
        border-radius: 24px;
        padding: 26px 32px;
        box-shadow: 0 20px 45px rgba(31, 58, 44, 0.2);
      }
      .hero h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        margin: 0 0 12px;
        max-width: 700px;
      }
      .hero-text {
        max-width: 650px;
        font-size: 1.05rem;
        color: #dfe9df;
        white-space: normal;
      }
      .title-text {
        max-width: 650px;
        font-size: 1.5rem;
        color: #fff200;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 0.78rem;
        font-weight: 700;
        color: #9bc2aa;
        margin-bottom: 8px;
      }
      .address p {
        margin: 2px 0; /* Adjust as needed */
        line-height: 1.2; /* Optional: reduce line height */
      }
      .primary-link {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #f2b56b;
        color: #2b2218;
        font-weight: 700;
      }
      main {
        display: grid;
        gap: 20px;
        margin-top: 24px;
      }
      .section-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(31, 58, 44, 0.08);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .p {
        white-space: normal;
      }

      /* More specific rule to style the navbar even though it also has .section-card */
      .section-card.nav-bar {
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)),
          url("https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1400&q=80");
        background-size: cover;
        background-position: center;
        color: #fff;
      }
      .section-heading h2 {
        margin: 0 0 16px;
      }
      .book-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      .book-card {
        background: #fffdf8;
        border-radius: 16px;
        padding: 18px;
        border: 1px solid #e9e0d0;
      }
      .book-genre {
        margin: 0 0 8px;
        color: #7b5e3f;
        font-weight: 700;
      }
      .book-card h3 {
        margin: 0 0 6px;
      }
      .book-author {
        font-style: italic;
        color: #6b7280;
      }
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: #e7efe9;
        color: #355942;
        font-weight: 600;
      }
      .footer {
        text-align: center;
        padding: 24px 0 8px;
        color: #5b6470;
      }
      @media (max-width: 720px) {
        .app-shell {
          padding: 14px;
        }
        .nav-bar {
          flex-direction: column;
          gap: 12px;
          align-items: flex-start;
        }
        .hero {
          padding: 32px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState } = React;
      const featuredBooks = [
        {
          title: "The Silent Horizon",
          author: "Ava Morgan",
          genre: "Fiction",
          description:
            "A reflective journey through memory, time, and forgotten places.",
        },
        {
          title: "Garden of Ideas",
          author: "Noah Reed",
          genre: "Inspiration",
          description:
            "An elegant collection of essays on creativity and everyday wonder.",
        },
        {
          title: "Maps of the Moon",
          author: "Lina Brooks",
          genre: "Adventure",
          description:
            "A vivid tale of exploration, courage, and the stories we leave behind.",
        },
      ];
      const categories = [
        "Fiction",
        "History",
        "Science",
        "Poetry",
        "Children",
      ];

      function Navbar({ currentPage, onNavigate }) {
        return (
          <nav className="section-card nav-bar">
            <div>
              <strong className="nav-title">പതിയാർ ഗ്രന്ഥാലയം</strong>
            </div>
            <div className="nav-links">
              {["home", "about", "contact"].map((page) => (
                <button
                  key={page}
                  type="button"
                  className={`nav-link${currentPage === page ? " active" : ""}`}
                  onClick={() => onNavigate(page)}
                >
                  {page.charAt(0).toUpperCase() + page.slice(1)}
                </button>
              ))}
            </div>
          </nav>
        );
      }

      function HomePage() {
        return (
          <>
            <header className="hero">
              <div>
                <p className="title-text">
                  Discover calm, knowledge, and stories in one place.
                </p>
                <p className="hero-text">
                  A peaceful digital library experience for readers who enjoy
                  timeless books and thoughtful browsing.
                </p>
                <a className="primary-link" href="#collection">
                  Explore Books
                </a>
              </div>
            </header>
            <main>
              <section className="section-card" id="collection">
                <div className="section-heading">
                  <p className="eyebrow">Featured Collection</p>
                  <h2>Popular books this month</h2>
                </div>
                <div className="book-grid">
                  {featuredBooks.map((book) => (
                    <article key={book.title} className="book-card">
                      <p className="book-genre">{book.genre}</p>
                      <h3>{book.title}</h3>
                      <p className="book-author">by {book.author}</p>
                      <p>{book.description}</p>
                    </article>
                  ))}
                </div>
              </section>
              <section className="section-card">
                <div className="section-heading">
                  <p className="eyebrow">Browse by Topic</p>
                  <h2>Find your next favorite read</h2>
                </div>
                <div className="chip-row">
                  {categories.map((category) => (
                    <span key={category} className="chip">
                      {category}
                    </span>
                  ))}
                </div>
              </section>
            </main>
          </>
        );
      }

      function EventBanner() {
        return (
          <section className="event-banner section-card">
            <div>
              <div className="event-badge">
                Upcoming Event: Live World Cup football screening
              </div>

              <p>
                🔥 The stage is set for an epic clash! Join us as we watch
                France 🇫🇷 vs Morocco 🇲🇦 in the FIFA World Cup 2026 Quarterfinal.
                Bring your passion, wear your team’s colors, and let’s
                experience every goal, save, and celebration together!
              </p>
              <div className="event-note">
                <strong>Time:</strong> July 10 - 12:30 AM onwards.
              </div>
              <div className="event-note">
                <strong>Location:</strong> Near Library
              </div>
            </div>
          </section>
        );
      }

      function AboutPage() {
        return (
          <section className="section-card">
            <p className="eyebrow">About the Library</p>
            <h2>Built for readers who love simplicity.</h2>
            <p>
              പതിയാർ ഗ്രന്ഥാലയം is a calm, static library website designed to
              highlight curated books, thoughtful categories, and an inviting
              browsing experience.
            </p>
            <p>
              The content is intentionally simple and reliable, making it ideal
              for a polished first React project.
            </p>
          </section>
        );
      }

      function ContactPage() {
        return (
          <section className="section-card">
            <p className="eyebrow">Contact</p>
            <h1>Visit us</h1>
            <div className="address">
              <p>Pathiyaar Granthalayam</p>
              <p>Chemmarathur (PO)</p>
              <p>Vadakara</p>
              <p> 673104</p>
            </div>
            <p>Phone: +91 94475 36269</p>
          </section>
        );
      }

      function App() {
        const [currentPage, setCurrentPage] = useState("home");

        const renderPage = () => {
          if (currentPage === "about") return <AboutPage />;
          if (currentPage === "contact") return <ContactPage />;
          return <HomePage />;
        };

        return (
          <div className="app-shell">
            <Navbar currentPage={currentPage} onNavigate={setCurrentPage} />
            <EventBanner />
            {renderPage()}
            <footer className="footer">
              <p>© 2026 പതിയാർ ഗ്രന്ഥാലയം. All rights reserved.</p>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
