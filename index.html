<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern static library website built with React"
    />
    <title>Pathiyaar Library</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.5;
        font-weight: 400;
        color: #1f2937;
        background: #f5efe6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #f7f0e6 0%, #e8e1d3 100%);
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font: inherit;
      }
      .app-shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding: 16px 20px;
      }
      .nav-links {
        display: flex;
        gap: 10px;
      }
      .nav-link {
        border: none;
        background: #f1e9db;
        padding: 8px 14px;
        border-radius: 999px;
        cursor: pointer;
        color: #355942;
      }
      .nav-link.active {
        background: #1f3a2c;
        color: #fff;
      }
      .hero {
        background: #1f3a2c;
        color: #f9f5eb;
        border-radius: 24px;
        padding: 56px 32px;
        box-shadow: 0 20px 45px rgba(31, 58, 44, 0.2);
      }
      .hero h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        margin: 0 0 12px;
        max-width: 700px;
      }
      .hero-text {
        max-width: 650px;
        font-size: 1.05rem;
        color: #dfe9df;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 0.78rem;
        font-weight: 700;
        color: #9bc2aa;
        margin-bottom: 8px;
      }
      .primary-link {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #f2b56b;
        color: #2b2218;
        font-weight: 700;
      }
      main {
        display: grid;
        gap: 20px;
        margin-top: 24px;
      }
      .section-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(31, 58, 44, 0.08);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .section-heading h2 {
        margin: 0 0 16px;
      }
      .book-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      .book-card {
        background: #fffdf8;
        border-radius: 16px;
        padding: 18px;
        border: 1px solid #e9e0d0;
      }
      .book-genre {
        margin: 0 0 8px;
        color: #7b5e3f;
        font-weight: 700;
      }
      .book-card h3 {
        margin: 0 0 6px;
      }
      .book-author {
        font-style: italic;
        color: #6b7280;
      }
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: #e7efe9;
        color: #355942;
        font-weight: 600;
      }
      .footer {
        text-align: center;
        padding: 24px 0 8px;
        color: #5b6470;
      }
      @media (max-width: 720px) {
        .app-shell {
          padding: 14px;
        }
        .nav-bar {
          flex-direction: column;
          gap: 12px;
          align-items: flex-start;
        }
        .hero {
          padding: 32px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState } = React;
      const featuredBooks = [
        {
          title: "The Silent Horizon",
          author: "Ava Morgan",
          genre: "Fiction",
          description:
            "A reflective journey through memory, time, and forgotten places.",
        },
        {
          title: "Garden of Ideas",
          author: "Noah Reed",
          genre: "Inspiration",
          description:
            "An elegant collection of essays on creativity and everyday wonder.",
        },
        {
          title: "Maps of the Moon",
          author: "Lina Brooks",
          genre: "Adventure",
          description:
            "A vivid tale of exploration, courage, and the stories we leave behind.",
        },
      ];
      const categories = [
        "Fiction",
        "History",
        "Science",
        "Poetry",
        "Children",
      ];

      function Navbar({ currentPage, onNavigate }) {
        return (
          <nav className="section-card nav-bar">
            <div>
              <strong>Pathiyaar Library</strong>
            </div>
            <div className="nav-links">
              {["home", "about", "contact"].map((page) => (
                <button
                  key={page}
                  type="button"
                  className={`nav-link${currentPage === page ? " active" : ""}`}
                  onClick={() => onNavigate(page)}
                >
                  {page.charAt(0).toUpperCase() + page.slice(1)}
                </button>
              ))}
            </div>
          </nav>
        );
      }

      function HomePage() {
        return (
          <>
            <header className="hero">
              <div className="hero-content">
                <p className="eyebrow">Pathiyaar Library</p>
                <h1>Discover calm, knowledge, and stories in one place.</h1>
                <p className="hero-text">
                  A peaceful digital library experience for readers who enjoy
                  timeless books and thoughtful browsing.
                </p>
                <a className="primary-link" href="#collection">
                  Explore Books
                </a>
              </div>
            </header>
            <main>
              <section className="section-card" id="collection">
                <div className="section-heading">
                  <p className="eyebrow">Featured Collection</p>
                  <h2>Popular books this month</h2>
                </div>
                <div className="book-grid">
                  {featuredBooks.map((book) => (
                    <article key={book.title} className="book-card">
                      <p className="book-genre">{book.genre}</p>
                      <h3>{book.title}</h3>
                      <p className="book-author">by {book.author}</p>
                      <p>{book.description}</p>
                    </article>
                  ))}
                </div>
              </section>
              <section className="section-card">
                <div className="section-heading">
                  <p className="eyebrow">Browse by Topic</p>
                  <h2>Find your next favorite read</h2>
                </div>
                <div className="chip-row">
                  {categories.map((category) => (
                    <span key={category} className="chip">
                      {category}
                    </span>
                  ))}
                </div>
              </section>
            </main>
          </>
        );
      }

      function AboutPage() {
        return (
          <section className="section-card">
            <p className="eyebrow">About the Library</p>
            <h2>Built for readers who love simplicity.</h2>
            <p>
              Pathiyaar Library is a calm, static library website designed to
              highlight curated books, thoughtful categories, and an inviting
              browsing experience.
            </p>
            <p>
              The content is intentionally simple and reliable, making it ideal
              for a polished first React project.
            </p>
          </section>
        );
      }

      function ContactPage() {
        return (
          <section className="section-card">
            <p className="eyebrow">Contact</p>
            <h2>Visit or write to us</h2>
            <p>123 Reading Street, Colombo 07</p>
            <p>Email: hello@pathiyaarlibrary.com</p>
            <p>Phone: +94 77 123 4567</p>
          </section>
        );
      }

      function App() {
        const [currentPage, setCurrentPage] = useState("home");

        const renderPage = () => {
          if (currentPage === "about") return <AboutPage />;
          if (currentPage === "contact") return <ContactPage />;
          return <HomePage />;
        };

        return (
          <div className="app-shell">
            <Navbar currentPage={currentPage} onNavigate={setCurrentPage} />
            {renderPage()}
            <footer className="footer">
              <p>© 2026 Pathiyaar Library. All rights reserved.</p>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
